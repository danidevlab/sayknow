name: Keep-Alive-Supabase
on:
  schedule:
    - cron: '*/1 * * * *' # 매 5분마다 실행
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Function
        id: ping
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://vqtolrqlqvfpzjsedjrw.supabase.co/functions/v1/smooth-task/?askdata=안녕")
          echo "status_code=$response" >> $GITHUB_OUTPUT
          if [ "$response" -ne 200 ]; then
            echo "Ping failed"
            exit 1
          fi

      - name: Create GitHub Issue if ping failed
        if: failure() # 이전 단계 실패 시 실행
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Supabase Ping Failed",
              body: "자동화된 알림: Supabase 함수 [함수이름] ping이 실패했습니다. 5분마다 시도하는 동안 문제가 발생했습니다."
            })
