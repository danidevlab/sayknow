name: Keep-Alive-Supabase
on:
  schedule:
    - cron: '*/15 * * * *' # 5분마다 실행 (효율성 최적화)
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Initial Request to Warm Up Function
        id: warmup
        run: |
          echo "🔥 Sending initial request to warm up the function..."
          curl -s "https://vqtolrqlqvfpzjsedjrw.supabase.co/functions/v1/smooth-task/?askdata=?ask=dd" > /dev/null
          echo "⏳ Waiting 30 seconds for function to fully initialize..."
          sleep 30

      - name: Check Supabase Function Status
        id: ping
        run: |
          echo "✅ Checking function status after 30 seconds..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://vqtolrqlqvfpzjsedjrw.supabase.co/functions/v1/smooth-task/?askdata=?ask=dd")
          echo "status_code=$response" >> $GITHUB_OUTPUT
          echo "Response status: $response"
          if [ "$response" -ne 200 ]; then
            echo "Ping failed with status $response"
            exit 1
          fi

      - name: Create GitHub Issue if ping failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Supabase Ping 실패 알림",
              body: "자동화된 알림: Supabase Edge Function (`smooth-task`) 호출에 실패했습니다. 확인이 필요합니다."
            })
