name: Keep-Alive-Supabase
on:
  schedule:
    - cron: '*/5 * * * *' # 5분마다 실행 (효율성 최적화)
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Function
        id: ping
        run: |
          # curl 응답 코드를 확인합니다.
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://vqtolrqlqvfpzjsedjrw.supabase.co")
          echo "status_code=$response" >> $GITHUB_OUTPUT
          if [ "$response" -ne 200 ]; then
            echo "Ping failed with status $response"
            exit 1
          fi

      - name: Create GitHub Issue if ping failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Supabase Ping 실패 알림",
              body: "자동화된 알림: Supabase Edge Function (`smooth-task`) 호출에 실패했습니다. 확인이 필요합니다."
            })
