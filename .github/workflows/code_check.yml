name: Full Code Lint & Issue

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # -------------------------
      # Python 환경 세팅
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # -------------------------
      # Node.js 환경 세팅 (JS/HTML/CSS용)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install JS/CSS/HTML linters
        run: |
          npm install -g eslint stylelint htmlhint

      # -------------------------
      # Python 검사
      - name: Run Python flake8
        id: python_lint
        run: |
          flake8 . --exit-zero > python_lint.txt
          echo "::set-output name=result::$(cat python_lint.txt)"

      # -------------------------
      # JS 검사
      - name: Run JavaScript ESLint
        id: js_lint
        run: |
          eslint "**/*.js" --format compact --no-error-on-unmatched-pattern > js_lint.txt || true
          echo "::set-output name=result::$(cat js_lint.txt)"

      # -------------------------
      # CSS 검사
      - name: Run CSS stylelint
        id: css_lint
        run: |
          stylelint "**/*.css" --allow-empty-input > css_lint.txt || true
          echo "::set-output name=result::$(cat css_lint.txt)"

      # -------------------------
      # HTML 검사
      - name: Run HTML hint
        id: html_lint
        run: |
          htmlhint "**/*.html" > html_lint.txt || true
          echo "::set-output name=result::$(cat html_lint.txt)"

      # -------------------------
      # 모든 결과 합치기
      - name: Combine lint results
        run: |
          cat python_lint.txt js_lint.txt css_lint.txt html_lint.txt > full_lint.txt

      # -------------------------
      # 이슈 생성
      - name: Create GitHub issue if errors found
        if: steps.python_lint.outputs.result != '' || steps.js_lint.outputs.result != '' || steps.css_lint.outputs.result != '' || steps.html_lint.outputs.result != ''
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "자동 코드 오류 보고 (Python/JS/CSS/HTML)"
          content-file: full_lint.txt
          labels: bug, automation
